<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <title>Lark / waterfall-for-juju-2026</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="lark-scene" aria-label="Abstract smoke and ember design">
      <canvas id="lark-canvas" aria-hidden="true"></canvas>

      <div class="lark-overlay" aria-hidden="true">
        <div class="scene-vignette"></div>
        <div class="scene-grain"></div>
        <div class="hidden-ju">ju</div>
      </div>

      <button
        id="motion-permission-button"
        class="motion-permission-button"
        type="button"
        aria-label="Enable tilt motion"
      >
        tilt
      </button>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
