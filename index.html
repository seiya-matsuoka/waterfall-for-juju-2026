<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Waterfall for juju 2026</title>
    <link rel="stylesheet" href="./style.css" />

    <!-- favicon 関連 -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <!-- fallback 用 -->
    <link rel="icon" href="images/favicon.ico" />
  </head>
  <body>
    <div class="app-shell">
      <iframe
        id="design-frame"
        class="design-frame"
        title="waterfall-for-juju-2026 design viewer"
        src="./designs/impreza/index.html"
        loading="eager"
        allow="fullscreen"
      ></iframe>

      <nav class="design-switcher" aria-label="Design switcher">
        <button
          class="design-tab is-active"
          type="button"
          data-design="impreza"
          aria-pressed="true"
        >
          Impreza
        </button>

        <button
          class="design-tab"
          type="button"
          data-design="lark"
          aria-pressed="false"
        >
          LARK
        </button>

        <button
          class="design-tab"
          type="button"
          data-design="heaven"
          aria-pressed="false"
        >
          Heaven
        </button>
      </nav>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
